<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dotty Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 160px; height: 190px; background: transparent; overflow: hidden; }

    .panel {
      width: 150px;
      background: rgba(255,255,255,0.97);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 7px;
      margin: 5px;
      font-family: 'Inter', -apple-system, sans-serif;
      position: relative;
    }

    /* ── 四宫格 ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      position: relative;
      width: 100%;
    }

    .grid::before {
      content: '';
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 0.5px;
      background: #E8E8E8;
      transform: translateX(-50%);
      z-index: 1;
    }
    .grid::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 0.5px;
      background: #E8E8E8;
      transform: translateY(-50%);
      z-index: 1;
    }

    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 4px;
      border-radius: 8px;
      transition: background 0.12s;
      user-select: none;
      position: relative;
      z-index: 2;
    }
    .cell:hover { background: #F4F4F4; }
    .cell:active { background: #EBEBEB; }
    .cell svg { width: 26px; height: 26px; flex-shrink: 0; }
    .cell-label { font-size: 8px; font-weight: 600; color: #4C4C4C; letter-spacing: 0.2px; }

    /* ── 底部右下角两个图标按钮 ── */
    .bottom-row {
      display: flex;
      justify-content: flex-end;
      gap: 3px;
      margin-top: 5px;
    }
    .icon-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
    }
    .icon-btn:hover { background: #F4F4F4; }
    .icon-btn.exit:hover { background: #FFF0F0; }
    .icon-btn svg { width: 14px; height: 14px; }
    /* ── Exit confirm overlay ── */
    .exit-confirm {
      display: none;
      position: fixed;
      /* Anchor to bottom of viewport so it never clips outside the window */
      bottom: 6px; right: 6px; left: 6px;
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
      padding: 10px 12px;
      z-index: 100;
      flex-direction: column;
      gap: 8px;
    }
    .exit-confirm p {
      font-size: 11px;
      color: #444;
      line-height: 1.4;
    }
    .exit-confirm-btns {
      display: flex;
      gap: 6px;
    }
    .exit-confirm-btns button {
      flex: 1; height: 26px;
      border-radius: 6px;
      border: none;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .exit-confirm-btns .btn-yes { background: #e05555; color: #fff; }
    .exit-confirm-btns .btn-yes:hover { background: #c94444; }
    .exit-confirm-btns .btn-no  { background: #f0f0f0; color: #555; }
    .exit-confirm-btns .btn-no:hover  { background: #e4e4e4; }
  </style>
</head>

  <script>
    function nav(page) {
      if (window.electron && window.electron.menuNavigate) {
        window.electron.menuNavigate(page)
      }
    }
    function askExit() {
      const el = document.getElementById('exit-confirm')
      el.style.display = el.style.display === 'flex' ? 'none' : 'flex'
    }
    function confirmExit() {
      nav('exit')
    }
    function cancelExit() {
      document.getElementById('exit-confirm').style.display = 'none'
    }
    function chatOpen() {
      if (window.electron && window.electron.chatOpen) {
        window.electron.chatOpen()
      }
    }
    function resetOverlays() {
      document.getElementById('exit-confirm').style.display = 'none'
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && window.electron) window.electron.menuClose()
    })
    // Reset overlay state every time the menu is shown (main process sends this).
    if (window.electron && window.electron.onMenuReset) {
      window.electron.onMenuReset(resetOverlays)
    }
  </script>
</body>
</html>
