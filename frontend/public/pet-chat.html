<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dotty Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 320px; height: 480px;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
      user-select: none;
    }

    .window {
      width: 312px;
      height: 472px;
      margin: 4px;
      background: rgba(255,255,255,0.98);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
      border: 0.5px solid rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 标题栏 ── */
    .titlebar {
      height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      background: linear-gradient(135deg, #99E5E2 0%, #83B5B5 100%);
      border-radius: 18px 18px 0 0;
    }
    .titlebar-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .titlebar-name {
      font-size: 13px; font-weight: 700;
      color: #fff;
      flex: 1;
      letter-spacing: 0.3px;
    }
    .titlebar-status {
      font-size: 9px;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
    }
    .close-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .close-btn:hover { background: rgba(255,255,255,0.45); }
    .close-btn svg { width: 10px; height: 10px; }

    /* ── 消息区 ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

    /* 欢迎提示 */
    .welcome {
      text-align: center;
      padding: 16px 8px;
      color: #bbb;
      font-size: 10px;
      line-height: 1.7;
    }
    .welcome-emoji { font-size: 28px; display: block; margin-bottom: 6px; }

    /* 气泡 */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .bubble-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #99E5E2;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .bubble-row.user .bubble-avatar { background: #4C4C4C; }

    .bubble {
      max-width: 210px;
      padding: 8px 11px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.assistant {
      background: #F4F4F4;
      color: #2C2C2C;
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: #4C4C4C;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* 打字指示器 */
    .typing {
      display: flex; align-items: center; gap: 3px;
      padding: 10px 12px;
    }
    .typing span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #bbb;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── 意图确认卡片 ── */
    .intent-card {
      margin: 4px 12px 4px;
      background: linear-gradient(135deg, #f0fafa 0%, #e8f5f5 100%);
      border: 1px solid #99E5E2;
      border-radius: 12px;
      padding: 10px 12px;
      flex-shrink: 0;
    }
    .intent-card-title {
      font-size: 10px;
      font-weight: 700;
      color: #83B5B5;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .intent-event-info {
      font-size: 11px;
      color: #3C3C3C;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .intent-event-info strong { color: #2C2C2C; }
    .intent-actions {
      display: flex;
      gap: 6px;
    }
    .btn-confirm {
      flex: 1;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: #83B5B5;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-confirm:hover { background: #6fa3a3; }
    .btn-cancel {
      flex: 1;
      height: 28px;
      border-radius: 8px;
      border: 0.5px solid #ddd;
      background: #fff;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-cancel:hover { background: #f5f5f5; }

    /* ── 输入区 ── */
    .input-area {
      padding: 8px 10px 10px;
      display: flex;
      gap: 6px;
      align-items: flex-end;
      flex-shrink: 0;
      border-top: 0.5px solid #f0f0f0;
      -webkit-app-region: no-drag;
    }
    .input-box {
      flex: 1;
      min-height: 34px;
      max-height: 80px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 0.5px solid #e0e0e0;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.4;
      color: #2C2C2C;
      background: #fafafa;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    .input-box:focus { border-color: #99E5E2; background: #fff; }
    .input-box::placeholder { color: #bbb; }
    .send-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      border: none;
      background: #83B5B5;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #6fa3a3; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #ddd; cursor: default; }
    .send-btn svg { width: 16px; height: 16px; }

    /* 清空历史按钮 */
    .clear-btn {
      position: absolute;
      top: 12px; right: 44px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.4); }
    .clear-btn svg { width: 11px; height: 11px; }
    .titlebar { position: relative; }

    /* ── 自定义确认弹窗（替代 window.confirm，Electron 不支持） ── */
    .confirm-overlay {
      display: none;
      position: absolute;
      bottom: 56px; right: 10px;
      background: #fff;
      border: 0.5px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 10px 12px;
      z-index: 100;
      flex-direction: column;
      gap: 8px;
      width: 160px;
    }
    .confirm-overlay p {
      font-size: 11px;
      color: #444;
      line-height: 1.4;
    }
    .confirm-overlay-btns {
      display: flex;
      gap: 6px;
    }
    .confirm-overlay-btns button {
      flex: 1; height: 26px;
      border-radius: 6px;
      border: none;
      font-size: 11px;
      cursor: pointer;
    }
    .confirm-overlay-btns .btn-yes {
      background: #e05555; color: #fff;
    }
    .confirm-overlay-btns .btn-yes:hover { background: #c94444; }
    .confirm-overlay-btns .btn-no {
      background: #f0f0f0; color: #555;
    }
    .confirm-overlay-btns .btn-no:hover { background: #e4e4e4; }
  </style>
</head>
<body>
  <div class="window">
    <!-- 标题栏 -->
    <div class="titlebar">
      <div class="titlebar-avatar">🐾</div>
      <div style="flex:1; display:flex; flex-direction:column; gap:1px;">
        <span class="titlebar-name">Dotty</span>
        <span class="titlebar-status" id="status-text">Online</span>
      </div>
      <button class="clear-btn" onclick="clearHistory()" title="清空对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
      <button class="close-btn" onclick="closeChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- 消息区 -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <span class="welcome-emoji">🐾</span>
        Hi! I'm Dotty~<br>
        How can I help you today?<br>
        <span style="color:#ccc; font-size:9px;">Tell me your schedule and I'll add it for you</span>
      </div>
    </div>

    <!-- 意图确认卡片（默认隐藏） -->
    <div class="intent-card" id="intent-card" style="display:none;">
      <div class="intent-card-title">📅 Add to schedule?</div>
      <div class="intent-event-info" id="intent-info"></div>
      <div class="intent-actions">
        <button class="btn-confirm" onclick="confirmEvent()">Confirm</button>
        <button class="btn-cancel" onclick="dismissIntent()">Cancel</button>
      </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area" style="position:relative;">
      <!-- 清空确认弹窗 -->
      <div class="confirm-overlay" id="clear-confirm">
        <p>Clear all chat history?</p>
        <div class="confirm-overlay-btns">
          <button class="btn-yes" onclick="doClear()">Clear</button>
          <button class="btn-no" onclick="cancelClear()">Cancel</button>
        </div>
      </div>
      <textarea
        class="input-box"
        id="input"
        placeholder="Say something to Dotty..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8766'
    let PROVIDER = 'ollama'
    let MODEL = 'qwen2.5'

    let messages = []
    let pendingIntent = null
    let isStreaming = false
    let welcomeHidden = false

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
      try {
        const sr = await fetch(`${API}/settings/`)
        if (sr.ok) {
          const s = await sr.json()
          if (s.ai_provider) PROVIDER = s.ai_provider
          if (s.ai_model)    MODEL    = s.ai_model
        }
      } catch (e) {
        console.warn('[init] failed to load settings:', e)
      }

      try {
        const res = await fetch(`${API}/chat-history/`)
        if (!res.ok) return
        const history = await res.json()
        if (history.length === 0) return
        hideWelcome()
        // Render all bubbles first, then scroll once — avoids N scroll calls
        for (const msg of history) {
          if (msg.role === 'user' || msg.role === 'assistant') {
            messages.push({ role: msg.role, content: msg.content })
          }
          appendBubble(msg.role, msg.content, /* scroll= */ false)
        }
        scrollToBottom()
      } catch (e) {
        console.warn('[init] failed to load history:', e)
      }
    }

    init()

    // ── UI helpers ────────────────────────────────────────────────────────────

    function hideWelcome() {
      if (welcomeHidden) return
      const el = document.getElementById('welcome')
      if (el) { el.style.display = 'none'; welcomeHidden = true }
    }

    function scrollToBottom() {
      const el = document.getElementById('messages')
      el.scrollTop = el.scrollHeight
    }

    function autoResize(el) {
      el.style.height = 'auto'
      el.style.height = Math.min(el.scrollHeight, 80) + 'px'
    }

    function setStatus(text) {
      document.getElementById('status-text').textContent = text
    }

    function setSendDisabled(disabled) {
      document.getElementById('send-btn').disabled = disabled
      const clearBtn = document.querySelector('.clear-btn')
      if (clearBtn) clearBtn.disabled = disabled
      isStreaming = disabled
    }

    // Sanitise text for safe innerHTML insertion
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    function appendBubble(role, text, scroll = true) {
      hideWelcome()
      const container = document.getElementById('messages')
      const row = document.createElement('div')
      row.className = `bubble-row ${role}`

      const avatar = document.createElement('div')
      avatar.className = 'bubble-avatar'
      avatar.textContent = role === 'user' ? '👤' : '🐾'

      const bubble = document.createElement('div')
      bubble.className = `bubble ${role}`
      bubble.textContent = text

      row.appendChild(avatar)
      row.appendChild(bubble)
      container.appendChild(row)
      if (scroll) scrollToBottom()
      return bubble
    }

    function appendToBubble(bubble, text) {
      bubble.textContent += text
      scrollToBottom()
    }

    function setBubbleText(bubble, text) {
      bubble.textContent = text
      scrollToBottom()
    }

    function showTyping() {
      const container = document.getElementById('messages')
      const row = document.createElement('div')
      row.className = 'bubble-row assistant'
      row.id = 'typing-row'
      const avatar = document.createElement('div')
      avatar.className = 'bubble-avatar'
      avatar.textContent = '🐾'
      const typing = document.createElement('div')
      typing.className = 'typing bubble assistant'
      typing.innerHTML = '<span></span><span></span><span></span>'
      row.appendChild(avatar)
      row.appendChild(typing)
      container.appendChild(row)
      scrollToBottom()
    }

    function removeTyping() {
      const el = document.getElementById('typing-row')
      if (el) el.remove()
    }

    // ── Intent card ───────────────────────────────────────────────────────────

    function showIntentCard(intent) {
      pendingIntent = intent
      const info = document.getElementById('intent-info')
      let timeStr = ''
      if (intent.start_time) {
        timeStr = intent.start_time
        if (intent.end_time) timeStr += ' ~ ' + intent.end_time
      }
      info.innerHTML =
        `<strong>${escapeHtml(intent.title || '')}</strong><br>` +
        `📅 ${escapeHtml(intent.date || '')}` +
        (timeStr ? `　⏰ ${escapeHtml(timeStr)}` : '')
      document.getElementById('intent-card').style.display = 'block'
      scrollToBottom()
    }

    function dismissIntent() {
      pendingIntent = null
      document.getElementById('intent-card').style.display = 'none'
    }

    function confirmEvent() {
      if (!pendingIntent) return
      const eventData = {
        title:       pendingIntent.title       || '',
        date:        pendingIntent.date        || '',
        startTime:   pendingIntent.start_time  || '',
        endTime:     pendingIntent.end_time    || '',
        color:       '#83B5B5',
        isCountdown: false,
        description: pendingIntent.description || '',
      }
      dismissIntent()
      if (window.electron && window.electron.confirmEvent) {
        window.electron.confirmEvent(eventData)
      }
      const confirmMsg = '✅ Event added! Check the Schedule page to view it.'
      appendBubble('assistant', confirmMsg)
      persistMessage('assistant', confirmMsg)
    }

    // ── Persistence ───────────────────────────────────────────────────────────

    function persistMessage(role, content) {
      fetch(`${API}/chat-history/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role, content }),
      }).catch(() => {})
    }

    // ── Context builder ───────────────────────────────────────────────────────

    // Always start with a user turn — Ollama rejects assistant-first context.
    function buildContext() {
      const slice = messages.slice(-20)
      let start = 0
      while (start < slice.length && slice[start].role !== 'user') start++
      return slice.slice(start)
    }

    // ── Intent JSON parser ────────────────────────────────────────────────────

    // Tolerates markdown code fences that qwen2.5 sometimes wraps around JSON.
    function parseIntentJson(str) {
      const fenced = str.match(/```(?:json)?\s*([\s\S]*?)```/)
      const src = fenced ? fenced[1] : str
      return JSON.parse(src.trim())
    }

    // ── Messaging ─────────────────────────────────────────────────────────────

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage()
      }
    }

    async function sendMessage() {
      if (isStreaming) return
      const input = document.getElementById('input')
      const text = input.value.trim()
      if (!text) return

      input.value = ''
      input.style.height = 'auto'
      dismissIntent()

      appendBubble('user', text)
      messages.push({ role: 'user', content: text })
      persistMessage('user', text)

      setSendDisabled(true)
      setStatus('Thinking...')
      showTyping()

      let assistantBubble = null
      let rawAccum    = ''
      let intentFound = false

      // Register IPC listeners before starting the stream
      window.electron.onChatChunk((line) => {
        const trimmed = line.trim()
        if (!trimmed) return
        let obj
        try { obj = JSON.parse(trimmed) } catch { return }
        if (obj.error || obj.done) return  // handled by onChatEnd / onChatError

        const chunk = obj.t
        if (typeof chunk !== 'string') return

        // Show assistant bubble on first chunk
        if (!assistantBubble) {
          removeTyping()
          assistantBubble = appendBubble('assistant', '')
        }

        rawAccum += chunk
        const markerIdx = rawAccum.indexOf('__INTENT__')
        if (markerIdx !== -1 && !intentFound) {
          intentFound = true
          setBubbleText(assistantBubble, rawAccum.slice(0, markerIdx).trimEnd())
        } else if (!intentFound) {
          appendToBubble(assistantBubble, chunk)
        }
      })

      window.electron.onChatEnd(() => {
        removeTyping()

        // Parse intent marker if present
        if (intentFound) {
          const markerIdx = rawAccum.indexOf('__INTENT__')
          try {
            const intent = parseIntentJson(rawAccum.slice(markerIdx + 10))
            if (intent && intent.type === 'add_event' && intent.date) {
              showIntentCard(intent)
            }
          } catch { /* malformed JSON — reply text still shown */ }
        }

        const finalText = intentFound
          ? rawAccum.slice(0, rawAccum.indexOf('__INTENT__')).trimEnd()
          : rawAccum.trimEnd()

        if (finalText) {
          messages.push({ role: 'assistant', content: finalText })
          persistMessage('assistant', finalText)
        } else if (assistantBubble && !assistantBubble.textContent.trim()) {
          assistantBubble.closest('.bubble-row')?.remove()
        }

        setStatus('Online')
        setSendDisabled(false)
        document.getElementById('input').focus()
      })

      window.electron.onChatError((msg) => {
        removeTyping()
        if (assistantBubble && !assistantBubble.textContent.trim()) {
          assistantBubble.closest('.bubble-row')?.remove()
        }
        const errMsg = `Sorry, Dotty ran into an issue: ${msg}`
        appendBubble('assistant', errMsg)
        persistMessage('assistant', errMsg)
        setStatus('Online')
        setSendDisabled(false)
        document.getElementById('input').focus()
      })

      // Kick off the stream via main process
      window.electron.chatStreamStart({
        messages: buildContext(),
        provider: PROVIDER,
        model: MODEL,
      })
    }

    // ── Controls ──────────────────────────────────────────────────────────────

    function closeChat() {
      if (window.electron && window.electron.chatClose) window.electron.chatClose()
    }

    function clearHistory() {
      const card = document.getElementById('clear-confirm')
      card.style.display = card.style.display === 'flex' ? 'none' : 'flex'
    }

    function doClear() {
      if (isStreaming) return
      document.getElementById('clear-confirm').style.display = 'none'
      messages = []
      pendingIntent = null
      welcomeHidden = false
      setSendDisabled(false)
      document.getElementById('intent-card').style.display = 'none'
      document.getElementById('messages').innerHTML = `
        <div class="welcome" id="welcome">
          <span class="welcome-emoji">🐾</span>
          Hi! I'm Dotty~<br>
          How can I help you today?<br>
          <span style="color:#ccc; font-size:9px;">Tell me your schedule and I'll add it for you</span>
        </div>`
      fetch(`${API}/chat-history/`, { method: 'DELETE' }).catch(() => {})
    }

    function cancelClear() {
      document.getElementById('clear-confirm').style.display = 'none'
    }

    window.addEventListener('load', () => document.getElementById('input').focus())
  </script>
</body>
</html>
